name: Dev-CI-Build
on:
  push:
    branches:
      - dev
      - stage
      - feature/**
  pull_request:
    branches:
      - dev
      - stage
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (leave empty for current branch)'
        required: false
        type: string

jobs:
  dev-build:
    name: Build and Deploy to DEV
    uses: ./.github/workflows/reusable-ci.yml
    with:
      environment_name: 'dev'
      branch_ref: ${{ github.event.inputs.branch || github.ref }}
      s3_folder: 'dev'
    secrets:
      AWS_ACCESS_KEY_ID: AKIAYCCDYV2X3SFUEGHR # ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:  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
 #${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:  us-east-1 #${{ secrets.AWS_REGION }}
