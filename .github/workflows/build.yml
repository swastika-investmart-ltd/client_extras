name: Build Client Extras

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_CONFIGURATION: Release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet Packages
        run: |
          dotnet restore .\ClientExtras.sln

      - name: Build Solution
        run: |
          dotnet build .\ClientExtras.sln `
            --configuration $env:BUILD_CONFIGURATION `
            --no-restore

      - name: Publish Web API
        run: |
          dotnet publish .\trunk\Services\Client.WebApi\Client.WebApi.csproj `
            --configuration $env:BUILD_CONFIGURATION `
            --no-build `
            --output .\publish

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClientExtras-Publish
          path: publish
          if-no-files-found: error
