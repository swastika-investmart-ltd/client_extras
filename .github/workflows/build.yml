name: Client Extras CI Build
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      CONFIGURATION: Release
      PROJECT_NAME: ClientExtras
      S3_BUCKET: mybucketp03

    steps:
      # =========================
      # Checkout Code
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4
      # =========================
      # Setup .NET SDK (net5.0 project)
      # =========================
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'
      # =========================
      - name: Generate Build Version (IST)
        shell: pwsh
        run: |
          $ist = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId(
            (Get-Date),
            'India Standard Time'
          )

          $version = $ist.ToString("yyyyMMdd_HHmmss")
          echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV

      # =========================
      # Restore Packages
      # =========================
      - name: Restore Dependencies
        run: dotnet restore .\trunk\ClientExtras.sln

      # =========================
      # Build Solution
      # =========================
      - name: Build Solution
        run: dotnet build .\trunk\ClientExtras.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      # =========================
      # Publish Web API
      # =========================
      - name: Publish Web API
        run: |
          dotnet publish .\trunk\Services\Client.WebApi\Client.WebApi.csproj `
            --configuration ${{ env.CONFIGURATION }} `
            --no-build `
            --output .\publish

      # =========================
      # Rename output with version
      # =========================
      - name: Versioned Output Folder
        shell: pwsh
        run: |
          Rename-Item -Path .\publish -NewName "publish_$env:BUILD_VERSION"
          
      # =========================
      # Configure AWS Credentials
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # =========================
      # Create ZIP Package
      # =========================
      - name: Create Deployment ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "publish_$env:BUILD_VERSION\*" `
            -DestinationPath "ClientExtras_$env:BUILD_VERSION.zip"

      # =========================
      # Upload ZIP to Amazon S3
      # =========================
      - name: Upload ZIP to Amazon S3
        shell: pwsh
        run: |
          aws s3 cp `
            "ClientExtras_$env:BUILD_VERSION.zip" `
            "s3://$env:S3_BUCKET/ClientExtras/ClientExtras_$env:BUILD_VERSION.zip"

      # =========================
      # Upload Artifact
      # =========================
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClientExtras-${{ env.BUILD_VERSION }}
          path: publish_${{ env.BUILD_VERSION }}
          retention-days: 30

      # =========================
      # Google Chat - SUCCESS
      # =========================
      - name: Notify Google Chat Success
        if: success()
        shell: pwsh
        run: |
          $body = @{
            text = "✅ BUILD SUCCESS`nProject: ClientExtras`nVersion: $env:BUILD_VERSION`nBranch: $env:GITHUB_REF_NAME`nRun: $env:GITHUB_RUN_NUMBER"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "${{ secrets.GOOGLE_CHAT_WEBHOOK }}" `
            -Method POST `
            -ContentType "application/json" `
            -Body $body

      # =========================
      # Google Chat - FAILURE
      # =========================
      - name: Notify Google Chat Failure
        if: failure()
        shell: pwsh
        run: |
          $body = @{
            text = "❌ BUILD FAILED`nProject: ClientExtras`nVersion: $env:BUILD_VERSION`nBranch: $env:GITHUB_REF_NAME`nRun: $env:GITHUB_RUN_NUMBER"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod -Uri "${{ secrets.GOOGLE_CHAT_WEBHOOK }}" `
            -Method POST `
            -ContentType "application/json" `
            -Body $body
