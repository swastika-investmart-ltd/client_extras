name: Client Extras Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      CONFIGURATION: Release

    steps:
      # Step 1: Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup .NET SDK (IMPORTANT: net5.0 project)
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'

      # Step 3: Restore NuGet packages
      - name: Restore Dependencies
        run: dotnet restore .\trunk\ClientExtras.sln

      # Step 4: Build Solution
      - name: Build Solution
        run: dotnet build .\trunk\ClientExtras.sln --configuration Release --no-restore

      # Step 5: Publish Web API
      - name: Publish Web API
        run: dotnet publish .\trunk\Services\Client.WebApi\Client.WebApi.csproj `
              --configuration Release `
              --no-build `
              --output .\publish

      # Step 6: Verify output (debug step - optional but useful)
      - name: List Published Files
        run: dir .\publish

      # Step 7: Upload Artifact (THIS is your build output)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClientExtras-Build
          path: publish
          retention-days: 30
