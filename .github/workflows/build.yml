name: Client Extras CI Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      CONFIGURATION: Release

    steps:

      # =========================
      # 1. Checkout Code
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # 2. Setup .NET SDK (match your project net5.0)
      # =========================
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'

      # =========================
      # 3. Generate Build Version (DateTime)
      # =========================
      - name: Generate Build Version
        shell: pwsh
        run: |
          $version = Get-Date -Format "yyyyMMdd_HHmmss"
          echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV

      # =========================
      # 4. Restore Packages
      # =========================
      - name: Restore Dependencies
        run: dotnet restore .\trunk\ClientExtras.sln

      # =========================
      # 5. Build Solution
      # =========================
      - name: Build Solution
        run: dotnet build .\trunk\ClientExtras.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      # =========================
      # 6. Publish Web API
      # =========================
      - name: Publish Web API
        run: |
          dotnet publish .\trunk\Services\Client.WebApi\Client.WebApi.csproj `
            --configuration ${{ env.CONFIGURATION }} `
            --no-build `
            --output .\publish

      # =========================
      # 7. Rename Publish Folder with Version
      # =========================
      - name: Versioned Output Folder
        shell: pwsh
        run: |
          Rename-Item -Path .\publish -NewName "publish_${env:BUILD_VERSION}"

      # =========================
      # 8. Upload Build Artifact (Versioned)
      # =========================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClientExtras-${{ env.BUILD_VERSION }}
          path: publish_${{ env.BUILD_VERSION }}
          retention-days: 30

      # =========================
      # 9. Google Chat Notification - SUCCESS
      # =========================
      - name: Notify Success
        if: success()
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK }}" `
          -H "Content-Type: application/json" `
          -d "{
            \"text\": \"✅ BUILD SUCCESS\nProject: ClientExtras\nVersion: ${{ env.BUILD_VERSION }}\nBranch: ${{ github.ref_name }}\nRun: ${{ github.run_number }}\"
          }"

      # =========================
      # 10. Google Chat Notification - FAILURE
      # =========================
      - name: Notify Failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK }}" `
          -H "Content-Type: application/json" `
          -d "{
            \"text\": \"❌ BUILD FAILED\nProject: ClientExtras\nVersion: ${{ env.BUILD_VERSION }}\nBranch: ${{ github.ref_name }}\nRun: ${{ github.run_number }}\"
          }"
