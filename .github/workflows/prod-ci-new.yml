name: PROD CI Build - Main Branch Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Deploy to PROD (main branch only)?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'

jobs:
  prod-build:
    name: Build and Upload to S3
    uses: ./.github/workflows/reusable-ci.yml
    with:
      environment_name: 'prod'
      branch_ref: refs/heads/main          # ← Ye hardcoded है
      s3_folder: 'prod'
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
