name: Reusable CI Build Pipeline

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
        description: 'Environment name (dev, staging, prod)'
      branch_ref:
        required: true
        type: string
        description: 'Branch reference to checkout'
      s3_folder:
        required: true
        type: string
        description: 'S3 folder path (dev, staging, prod)'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true

jobs:
  build:
    runs-on: windows-latest
    environment: ${{ inputs.environment_name }}

    env:
      CONFIGURATION: Release
      PROJECT_NAME: ClientExtras
      S3_BUCKET: mybucketp03

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'

      - name: Extract Branch Name
        shell: pwsh
        run: |
          $branch = "${{ inputs.branch_ref }}" -replace "refs/heads/", ""
          # Clean branch name (replace / with -)
          $branch = $branch -replace "/", "-"
          echo "BRANCH_NAME=$branch" >> $env:GITHUB_ENV
          Write-Host "Branch Name: $branch"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate Build Date and Number
        shell: pwsh
        run: |
          # Get current date (IST)
          $ist = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId((Get-Date),'India Standard Time')
          $buildDate = $ist.ToString("yyyyMMdd")
          
          # Get branch name and S3 folder
          $branchName = $env:BRANCH_NAME
          $s3Folder = "${{ inputs.s3_folder }}"
          $s3BucketPath = "s3://$env:S3_BUCKET/ClientExtras/$s3Folder"
          
          Write-Host "Checking S3 for existing builds..."
          Write-Host "S3 Path: $s3BucketPath"
          Write-Host "Looking for files: ${branchName}_${buildDate}_*.zip"
          
          # List all artifacts in S3 folder
          $artifacts = aws s3 ls "$s3BucketPath/" --region us-east-1
          
          if ($LASTEXITCODE -eq 0 -and $artifacts) {
            Write-Host "S3 Contents Found"
            
            # Extract just filenames (last column) and filter for today with same branch
            $fileList = $artifacts | ForEach-Object { 
              $parts = $_ -split '\s+'
              $parts[-1]  # Get filename only
            } | Where-Object { $_ -match "^${branchName}_${buildDate}_" }
            
            if ($fileList) {
              $buildCount = @($fileList).Count
              Write-Host "Found $buildCount builds today"
            } else {
              $buildCount = 0
              Write-Host "No builds today yet"
            }
          } else {
            Write-Host "First build or S3 folder empty"
            $buildCount = 0
          }
          
          # Next build number
          $nextBuildNumber = $buildCount + 1
          
          echo "BUILD_DATE=$buildDate" >> $env:GITHUB_ENV
          echo "BUILD_NUMBER=$nextBuildNumber" >> $env:GITHUB_ENV
          
          Write-Host "âś… Build Date: $buildDate"
          Write-Host "âś… Build Number: $nextBuildNumber"

      - name: Restore Dependencies
        run: dotnet restore .\trunk\ClientExtras.sln

      - name: Build Solution
        run: dotnet build .\trunk\ClientExtras.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Publish Web API
        run: |
          dotnet publish .\trunk\Services\Client.WebApi\Client.WebApi.csproj `
            --configuration ${{ env.CONFIGURATION }} `
            --no-build `
            --output .\publish

      - name: Rename Output
        shell: pwsh
        run: Rename-Item -Path .\publish -NewName "publish_$($env:BUILD_DATE)_$($env:BUILD_NUMBER)"

      - name: Create ZIP with Build Number
        shell: pwsh
        run: |
          $zipName = "$($env:BRANCH_NAME)_$($env:BUILD_DATE)_$($env:BUILD_NUMBER).zip"
          Write-Host "Creating ZIP: $zipName"
          Compress-Archive -Path "publish_$($env:BUILD_DATE)_$($env:BUILD_NUMBER)\*" -DestinationPath $zipName
          echo "ZIP_FILE_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload to S3
        shell: pwsh
        run: |
          Write-Host "Uploading: $env:ZIP_FILE_NAME"
          Write-Host "S3 Path: s3://$env:S3_BUCKET/ClientExtras/${{ inputs.s3_folder }}/"
          aws s3 cp "$env:ZIP_FILE_NAME" "s3://$env:S3_BUCKET/ClientExtras/${{ inputs.s3_folder }}/"

      - name: Build Summary
        if: always()
        run: |
          Write-Host "===================================="
          Write-Host "Build Summary"
          Write-Host "===================================="
          Write-Host "Environment: ${{ inputs.environment_name }}"
          Write-Host "Branch: $env:BRANCH_NAME"
          Write-Host "Build Date: $env:BUILD_DATE"
          Write-Host "Build Number: $env:BUILD_NUMBER"
          Write-Host "ZIP File: $env:ZIP_FILE_NAME"
          Write-Host "S3 Location: s3://$env:S3_BUCKET/ClientExtras/${{ inputs.s3_folder }}/"
          Write-Host "===================================="
