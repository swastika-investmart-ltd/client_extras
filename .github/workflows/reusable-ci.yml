name: Reusable CI Build Pipeline

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
        description: 'Environment name (dev, staging, prod)'
      branch_ref:
        required: true
        type: string
        description: 'Branch reference to checkout'
      s3_folder:
        required: true
        type: string
        description: 'S3 folder path (dev, staging, prod)'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true

jobs:
  build:
    runs-on: windows-latest
    environment: ${{ inputs.environment_name }}

    env:
      CONFIGURATION: Release
      PROJECT_NAME: ClientExtras
      S3_BUCKET: mybucketp03

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'

      - name: Generate Build Version (IST)
        shell: pwsh
        run: |
          $ist = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId((Get-Date),'India Standard Time')
          $version = $ist.ToString("yyyyMMdd_HHmmss")
          echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV
          Write-Host "Build Version: $version"

      - name: Extract Branch Name
        shell: pwsh
        run: |
          $branch = "${{ inputs.branch_ref }}"
          Write-Host "Raw branch_ref: $branch"
          
          # Remove refs/heads/ if present
          if ($branch -like "refs/heads/*") {
            $branch = $branch -replace "refs/heads/", ""
          }
          
          # Remove refs/pull/ if present (for PRs)
          if ($branch -like "refs/pull/*") {
            $branch = $branch -replace "refs/pull/", "pr-"
            $branch = $branch -replace "/merge", ""
          }
          
          # Clean branch name (replace / with -)
          $branch = $branch -replace "/", "-"
          
          Write-Host "✅ Extracted Branch Name: $branch"
          echo "BRANCH_NAME=$branch" >> $env:GITHUB_ENV

      - name: Restore Dependencies
        run: dotnet restore .\trunk\ClientExtras.sln

      - name: Build Solution
        run: dotnet build .\trunk\ClientExtras.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Publish Web API
        run: |
          dotnet publish .\trunk\Services\Client.WebApi\Client.WebApi.csproj `
            --configuration ${{ env.CONFIGURATION }} `
            --no-build `
            --output .\publish

      - name: Rename Output
        shell: pwsh
        run: Rename-Item -Path .\publish -NewName "publish_$env:BUILD_VERSION"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create ZIP with Branch Name
        shell: pwsh
        run: |
          $zipName = "ClientExtras_$env:BRANCH_NAME_$env:BUILD_VERSION.zip"
          Write-Host "Creating ZIP: $zipName"
          Compress-Archive -Path "publish_$env:BUILD_VERSION\*" -DestinationPath $zipName
          echo "ZIP_FILE_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload to S3
        shell: pwsh
        run: |
          Write-Host "Uploading: $env:ZIP_FILE_NAME"
          Write-Host "S3 Path: s3://$env:S3_BUCKET/ClientExtras/${{ inputs.s3_folder }}/"
          aws s3 cp "$env:ZIP_FILE_NAME" "s3://$env:S3_BUCKET/ClientExtras/${{ inputs.s3_folder }}/"
          Write-Host "✅ Upload complete"

      - name: Build Summary
        if: always()
        shell: pwsh
        run: |
          Write-Host "====================================" -ForegroundColor Cyan
          Write-Host "Build Summary" -ForegroundColor Cyan
          Write-Host "====================================" -ForegroundColor Cyan
          Write-Host "Environment: ${{ inputs.environment_name }}" -ForegroundColor Green
          Write-Host "Branch: $env:BRANCH_NAME" -ForegroundColor Green
          Write-Host "Build Version: $env:BUILD_VERSION" -ForegroundColor Green
          Write-Host "ZIP File: $env:ZIP_FILE_NAME" -ForegroundColor Green
          Write-Host "S3 Location: s3://$env:S3_BUCKET/ClientExtras/${{ inputs.s3_folder }}/" -ForegroundColor Green
          Write-Host "====================================" -ForegroundColor Cyan
