name: Reusable-CI-Pipeline

on:
  workflow_call:

    inputs:
      environment_name:
        required: true
        type: string

      branch_ref:
        required: true
        type: string

    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true


jobs:
  build:
    runs-on: windows-latest
    environment: ${{ inputs.environment_name }}

    env:
      CONFIGURATION: Release
      S3_BUCKET: mybucketp03

    steps:

      # -----------------------
      # Checkout Code
      # -----------------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch_ref }}

      # -----------------------
      # Setup .NET
      # -----------------------
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '5.0.x'

      # -----------------------
      # Extract Branch Name
      # -----------------------
      - name: Extract Branch Name
        shell: pwsh
        run: |
          $branch = "${{ inputs.branch_ref }}" -replace "refs/heads/", ""
          $branch = $branch -replace "/", "-"

          echo "BRANCH_NAME=$branch" >> $env:GITHUB_ENV
          Write-Host "Branch: $branch"

      # -----------------------
      # AWS Credentials
      # -----------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------
      # Build Date + Build Number (ENV BASED S3)
      # -----------------------
      - name: Generate Build Info
        shell: pwsh
        run: |
          $ist = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId((Get-Date),'India Standard Time')
          $buildDate = $ist.ToString("yyyyMMdd")

          $branchName = $env:BRANCH_NAME
          $envName = "${{ inputs.environment_name }}"
          $s3Path = "s3://$env:S3_BUCKET/ClientExtras/$envName"

          Write-Host "Checking S3: $s3Path"
          Write-Host "Pattern: ${branchName}_${buildDate}_*.zip"

          $count = 0

          $files = & aws s3 ls "$s3Path/" --region "${{ secrets.AWS_REGION }}" 2>$null

          if ($files) {
              $fileList = $files | ForEach-Object {
                  $parts = $_ -split '\s+'
                  $parts[-1]
              } | Where-Object { $_ -match "^${branchName}_${buildDate}_" }

              $count = @($fileList).Count
          }

          $buildNumber = $count + 1

          echo "BUILD_DATE=$buildDate" >> $env:GITHUB_ENV
          echo "BUILD_NUMBER=$buildNumber" >> $env:GITHUB_ENV

          Write-Host "Build Date: $buildDate"
          Write-Host "Build Number: $buildNumber"

      # -----------------------
      # Restore
      # -----------------------
      - name: Restore
        run: dotnet restore .\trunk\ClientExtras.sln

      # -----------------------
      # Build
      # -----------------------
      - name: Build
        run: dotnet build .\trunk\ClientExtras.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      # -----------------------
      # Publish
      # -----------------------
      - name: Publish
        run: |
          dotnet publish .\trunk\Services\Client.WebApi\Client.WebApi.csproj `
            --configuration ${{ env.CONFIGURATION }} `
            --output .\publish

      # -----------------------
      # Create ZIP (FINAL NAME)
      # -----------------------
      - name: Create ZIP
        shell: pwsh
        run: |
          $zipName = "$env:BRANCH_NAME" + "_" + "$env:BUILD_DATE" + "_" + "$env:BUILD_NUMBER" + ".zip"

          Write-Host "ZIP Name: $zipName"

          Compress-Archive -Path .\publish\* -DestinationPath $zipName

          echo "ZIP_FILE=$zipName" >> $env:GITHUB_ENV

      # -----------------------
      # Upload to S3
      # -----------------------
      - name: Upload to S3
        shell: pwsh
        run: |
          $envName = "${{ inputs.environment_name }}"
          $s3Path = "s3://$env:S3_BUCKET/ClientExtras/$envName/"

          Write-Host "Uploading: $env:ZIP_FILE"
          Write-Host "To: $s3Path"

          aws s3 cp "$env:ZIP_FILE" $s3Path

      # -----------------------
      # Build Summary
      # -----------------------
      - name: Build Summary
        if: always()
        run: |
          Write-Host "===================================="
          Write-Host "BUILD COMPLETED"
          Write-Host "===================================="
          Write-Host "Environment: ${{ inputs.environment_name }}"
          Write-Host "Branch: $env:BRANCH_NAME"
          Write-Host "Build Date: $env:BUILD_DATE"
          Write-Host "Build Number: $env:BUILD_NUMBER"
          Write-Host "ZIP File: $env:ZIP_FILE"
          Write-Host "S3 Path: s3://$env:S3_BUCKET/ClientExtras/${{ inputs.environment_name }}/"
          Write-Host "===================================="
